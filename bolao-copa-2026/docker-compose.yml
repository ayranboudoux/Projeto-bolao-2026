version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bolao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bolao_user
      POSTGRES_PASSWORD: bolao_pass
      POSTGRES_DB: bolao_copa_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao_user -d bolao_copa_2026"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bolao_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: bolao_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: bolao_user
      MONGO_INITDB_ROOT_PASSWORD: bolao_pass
      MONGO_INITDB_DATABASE: bolao_copa_2026
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  mongo_data:
